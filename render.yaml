services:
  - type: web
    name: chicago-crime-api
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py load_crime_data chicago_crime_data.csv
    startCommand: python manage.py migrate && gunicorn chicago_crime.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
